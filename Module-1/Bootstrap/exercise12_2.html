<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.2 - Pricing Section</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-5">
      <h2>Simple Pricing Options</h2>
      <p class="text-muted">Pick a plan that serves your architectural requirements.</p>
    </div>
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="card p-4 text-center shadow-sm">
          <h4 class="mb-3">Starter</h4>
          <h1 class="my-4">$9<span class="fs-6 text-muted">/mo</span></h1>
          <p class="mb-4">Essential tools to manage your basic tasks.</p>
          <button class="btn btn-outline-primary mt-auto">Sign Up</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card p-4 text-center border-primary shadow">
          <h4 class="mb-3 text-primary">Pro</h4>
          <h1 class="my-4">$29<span class="fs-6 text-muted">/mo</span></h1>
          <p class="mb-4">Advanced modules alongside premium automated systems.</p>
          <button class="btn btn-primary mt-auto">Get Started</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
