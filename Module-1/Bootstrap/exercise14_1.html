<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.1 - Display Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5 text-center">
    <div class="d-none d-md-block p-3 bg-info text-white mb-3">
      Visible only on Medium devices and up.
    </div>

    <div class="d-none d-lg-flex justify-content-center p-3 bg-success text-white">
      Visible as a Flex container only on Large screens and up.
    </div>
  </div>
</body>
</html>
