<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.2 - Card Shadow & Pill Elements</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-4" style="width: 22rem;">
      <div class="card-body text-center">
        <h5 class="card-title">Premium Access</h5>
        <p class="card-text text-muted mb-4">Leverage elevated access properties instantly.</p>
        <button class="btn btn-dark rounded-pill px-4">Activate Pill Button</button>
      </div>
    </div>
  </div>
</body>
</html>
