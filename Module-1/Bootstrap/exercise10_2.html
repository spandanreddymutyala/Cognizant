<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 10.2 - Tabbed Navigation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h2>Nav Tabs Layout</h2>
    <ul class="nav nav-tabs mb-4">
      <li class="nav-item"><a class="nav-link active" href="#">Active Tab</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Tab Link 2</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Tab Link 3</a></li>
    </ul>

    <h2>Nav Pills Layout</h2>
    <ul class="nav nav-pills">
      <li class="nav-item"><a class="nav-link active" href="#">Active Pill</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Pill Link 2</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Pill Link 3</a></li>
    </ul>
  </div>
</body>
</html>
