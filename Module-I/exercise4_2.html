<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.2 - Four Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-sm-3 p-3 bg-primary text-white border">Column 1</div>
      <div class="col-sm-3 p-3 bg-secondary text-white border">Column 2</div>
      <div class="col-sm-3 p-3 bg-success text-white border">Column 3</div>
      <div class="col-sm-3 p-3 bg-info text-white border">Column 4</div>
    </div>
  </div>
</body>
</html>
