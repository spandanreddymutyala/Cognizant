<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 11.2 - Media Object Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex align-items-start border p-3 rounded">
      <div class="flex-shrink-0">
        <img src="https://via.placeholder.com/64" class="me-3" alt="Sample Media Thumbnail">
      </div>
      <div class="flex-grow-1">
        <h5>Media Heading Aligned Left</h5>
        <p>This layout mimics traditional media objects by placing an image next to a block of narrative text layout elements flexibly.</p>
      </div>
    </div>
  </div>
</body>
</html>
