<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.2 - Tablet Sidebar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <nav id="sidebar" class="col-md-3 bg-dark min-vh-100 p-3 text-white d-none d-md-block">
        <h4>Navigation</h4>
        <p>This panel is completely hidden on mobile devices, displaying exclusively from tablet dimensions upward.</p>
      </nav>
      <main class="col-md-9 p-4">
        <h2>Main Project Area</h2>
        <p>Resize down to mobile viewing specs to watch the dark responsive sidebar dynamically collapse out of layout sight.</p>
      </main>
    </div>
  </div>
</body>
</html>
