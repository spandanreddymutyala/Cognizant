<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.2 - Reorder Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <div class="col-12 col-md-6 order-md-2 p-4 bg-warning text-center fw-bold">
        Box A (First on Mobile, Second on Medium+)
      </div>
      <div class="col-12 col-md-6 order-md-1 p-4 bg-info text-center fw-bold">
        Box B (Second on Mobile, First on Medium+)
      </div>
    </div>
  </div>
</body>
</html>
