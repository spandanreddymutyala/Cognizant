<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 & 3.2 - Responsive Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .grid-box { background-color: #f0f0f0; border: 1px solid #ccc; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="row g-3">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="grid-box">Column 1</div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="grid-box">Column 2</div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="grid-box">Column 3</div>
      </div>
    </div>
  </div>
</body>
</html>
