<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.1 - Sidebar Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row">
      <aside class="col-md-3 bg-light p-3 border">
        <h5>Sidebar Navigation</h5>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link" href="#">Link 1</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Link 2</a></li>
        </ul>
      </aside>
      <main class="col-md-9 p-3 border-top border-bottom border-end">
        <h2>Main Content Area</h2>
        <p>This area takes up 9 out of 12 grid spaces on medium and larger viewports.</p>
      </main>
    </div>
  </div>
</body>
</html>
