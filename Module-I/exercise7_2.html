<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 - Text Transformations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <p class="text-uppercase">this text was written lowercase but displays uppercase.</p>
    <p class="text-lowercase">THIS TEXT WAS WRITTEN UPPERCASE BUT DISPLAYS LOWERCASE.</p>
    <p class="text-capitalize">this text capitalizes the first letter of each word.</p>
  </div>
</body>
</html>
