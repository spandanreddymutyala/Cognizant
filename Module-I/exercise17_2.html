<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon Only Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="container mt-5">
    <h2>Media Dashboard Toolbar Control Set</h2>
    <div class="btn-group" role="group">
      <button type="button" class="btn btn-outline-secondary" aria-label="Edit item">
        <i class="bi bi-pencil-square"></i>
      </button>
      <button type="button" class="btn btn-outline-secondary" aria-label="Share tracking profile">
        <i class="bi bi-share-fill"></i>
      </button>
      <button type="button" class="btn btn-outline-danger" aria-label="Delete permanent tracking ledger">
        <i class="bi bi-trash3-fill"></i>
      </button>
    </div>
  </div>
</body>
</html>
